apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-replicaset
  labels:
    app: nginx-app
    tier: dev
spec:
  template:
    metadata:
      name: nginx
      labels:
        app: nginx-app
        tier: dev
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
  replicas: 3
  selector:
    matchLabels:
      app: nginx-app
      tier: dev
